name: Build .NET

on:
  workflow_dispatch:
    inputs:
        version:
          description: 'Build version'
          required: true
          default: '0.0.0'
  workflow_call:
    inputs:
        version:
          description: 'Build version'
          required: true
          type: string
          
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore msovideo_srgb.sln

      - name: Build
        run: dotnet build msovideo_srgb.sln --configuration Release --no-restore /p:Version=${{ inputs.version }}

      - name: Prepare output folder
        run: |
          powershell -Command "New-Item -ItemType Directory -Force -Path output"
          powershell -Command "Copy-Item msovideo_srgb\bin\x64\Release\net9.0-windows\*.exe output\"
          powershell -Command "Copy-Item msovideo_srgb\bin\x64\Release\net9.0-windows\*.dll output\"
          powershell -Command "Copy-Item LICENSE output\"
          powershell -Command "Copy-Item LICENSE-THIRD-PARTY output\"

      # Upload the output folder as artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: output/
